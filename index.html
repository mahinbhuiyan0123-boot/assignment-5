<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-400 min-h-screen py-10">
    <form id="login" class="fieldset bg-base-200 mx-auto border-base-300 rounded-box w-xl flex flex-col border p-4">

        <div class="flex flex-col items-center mb-4"><img src="./assets/github-logo.png" alt="">
            <h1 class="font-bold text-2xl">GitHub Issues Tracker</h1>
            <h3 class="text-gray-400">Sign in to manage your issues</h3>
        </div>
        <label class="label">Username</label>
        <input type="text" id="username" class="input w-full max-w-xl" value="admin" placeholder="Enter Username" />
        <p class="text-purple-600">Default: admin</p>

        <label class="label">Password</label>
        <input type="password" id="password" class="input w-full max-w-xl" value="admin123"
            placeholder="Enter Password" />
        <p class="text-purple-600">Default: admin123</p>

        <button type="submit" class="btn btn-neutral mt-4 bg-[#4A00FF]">Sign In</button>
        <div class="flex items-center my-6">
            <hr class="flex-grow border-gray-300">
            <span class="mx-4">OR</span>
            <hr class="flex-grow border-gray-300">
        </div>
        <p class="text-center">Demo Credentials:</p>
        <div class="text-center">
            <p>Username: admin</p>
            <p>Password: admin123</p>
        </div>
    </form>
    <script src="./java/script.js"></script>
</body>

</html>
